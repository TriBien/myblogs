<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Principles — Deep Dive Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0a0a0b;
        --bg-secondary: #141416;
        --bg-tertiary: #1c1c1f;
        --border-color: #2a2a2e;
        --text-primary: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --accent: #faf089;
        --accent-secondary: #facc15;
        --radius: 6px;
        --transition: 0.2s ease;
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      :root {
        --font-sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: "Space Mono", monospace;
        --base-size: 17px;
      }
      body {
        font-family: var(--font-sans);
        font-size: var(--base-size);
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.6;
        min-height: 100vh;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      header {
        background: rgba(10, 10, 11, 0.8);
        border-bottom: 1px solid var(--border-color);
        padding: 16px 0;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(16px);
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .logo-icon {
        font-size: 1.4rem;
        color: var(--accent);
      }
      .logo-text {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .nav-links {
        display: flex;
        gap: 24px;
      }
      .nav-links a {
        font-size: 1rem;
        color: var(--text-secondary);
        transition: var(--transition);
      }
      .nav-links a:hover {
        color: var(--text-primary);
      }

      main {
        max-width: 1300px;
        margin: 0 auto;
        padding: 56px 24px;
      }

      .hero {
        text-align: center;
        margin-bottom: 24px;
        padding: 48px 0;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 100px;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 24px;
      }
      .hero h1 {
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.1;
        margin-bottom: 20px;
        text-wrap: balance;
      }
      .hero h1 .highlight {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero p {
        color: var(--text-secondary);
        font-size: 1.25rem;
        max-width: 560px;
        margin: 0 auto;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      .section-header h2 {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 36px;
      }
      .filter-btn {
        padding: 10px 20px;
        border: 1px solid var(--border-color);
        background: transparent;
        color: var(--text-secondary);
        border-radius: 100px;
        cursor: pointer;
        font-size: 0.9375rem;
        font-weight: 500;
        transition: var(--transition);
      }
      .filter-btn:hover {
        border-color: var(--text-secondary);
        color: var(--text-primary);
      }
      .filter-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg-primary);
      }

      .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }

      .post-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 28px;
        display: flex;
        flex-direction: column;
        transition: border-color 0.2s ease, transform 0.2s ease;
        position: relative;
        cursor: pointer;
        width: 100%;
        text-align: left;
        font-family: inherit;
        color: inherit;
      }
      .post-card::after {
        content: "→";
        position: absolute;
        right: 24px;
        bottom: 28px;
        font-size: 1.25rem;
        color: var(--accent);
        opacity: 0;
        transform: translateX(-8px);
        transition: var(--transition);
      }
      .post-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .post-card:hover::after {
        opacity: 1;
        transform: translateX(0);
      }

      .post-card .category {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        background: var(--bg-tertiary);
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        width: fit-content;
        margin-bottom: 16px;
        font-family: var(--font-mono);
      }
      .post-card h2 {
        font-size: 1.375rem;
        font-weight: 600;
        line-height: 1.35;
        margin-bottom: 12px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .post-card .excerpt {
        color: var(--text-secondary);
        font-size: 1rem;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex-grow: 1;
      }
      .post-card .meta {
        display: flex;
        align-items: center;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border-color);
        font-size: 0.875rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
      }

      footer {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 24px 32px;
      }
      .footer-inner {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 48px;
      }
      .footer-brand {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .footer-brand .logo {
        font-size: 1.125rem;
      }
      .footer-brand p {
        color: var(--text-muted);
        font-size: 0.9375rem;
        line-height: 1.6;
        max-width: 280px;
      }
      .footer-col h4 {
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 16px;
      }
      .footer-col ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .footer-col a {
        color: var(--text-muted);
        font-size: 0.9375rem;
        transition: color 0.2s;
      }
      .footer-col a:hover {
        color: var(--accent);
      }
      .footer-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 48px;
        padding-top: 24px;
        border-top: 1px solid var(--border-color);
        font-size: 0.875rem;
        color: var(--text-muted);
      }
      .footer-bottom .social {
        display: flex;
        gap: 16px;
      }
      .footer-bottom .social a {
        color: var(--text-muted);
        font-size: 1.125rem;
        transition: color 0.2s;
      }
      .footer-bottom .social a:hover {
        color: var(--accent);
      }
      @media (max-width: 640px) {
        .footer-inner {
          grid-template-columns: 1fr;
          gap: 32px;
        }
        .footer-bottom {
          flex-direction: column;
          gap: 16px;
          text-align: center;
        }
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
        font-size: 0.875rem;
        color: var(--text-secondary);
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--accent);
      }

      .post-header {
        margin-bottom: 40px;
        padding-bottom: 32px;
        border-bottom: 1px solid var(--border-color);
      }
      .post-header .category {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        background: var(--bg-tertiary);
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 16px;
        font-family: var(--font-mono);
      }
      .post-header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.2;
        margin-bottom: 16px;
        scroll-margin-top: 80px;
      }
      .post-header .meta {
        display: flex;
        gap: 16px;
        font-size: 0.9375rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .content {
        font-size: 1.1875rem;
        color: var(--text-secondary);
      }
      .content p {
        margin-bottom: 1.5em;
      }
      .content h2 {
        font-size: 1.625rem;
        font-weight: 600;
        color: var(--text-primary);
        margin: 2em 0 1em;
      }
      .content h3 {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-primary);
        margin: 1.5em 0 0.75em;
      }
      .content ul,
      .content ol {
        margin-bottom: 1.5em;
        padding-left: 1.5em;
      }
      .content li {
        margin-bottom: 0.5em;
      }
      .content code {
        font-family: var(--font-mono);
        background: var(--bg-tertiary);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.875em;
      }
      .content pre {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 20px;
        overflow-x: auto;
        margin: 1.5em 0;
      }
      .content pre code {
        background: none;
        padding: 0;
      }
      .content blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 20px;
        margin: 1.5em 0;
        font-style: italic;
        color: var(--text-muted);
      }
      .content a {
        color: var(--accent);
        border-bottom: 1px solid transparent;
        transition: border-color 0.2s;
      }
      .content a:hover {
        border-bottom-color: var(--accent);
      }
      .content img {
        max-width: 100%;
        border-radius: var(--radius);
        margin: 1.5em 0;
      }
      .content hr {
        border: none;
        border-top: 1px solid var(--border-color);
        margin: 2em 0;
      }

      main {
        /* max-width: 720px; */
        margin: 0 auto;
        padding: 40px 24px;
      }

      @media (max-width: 640px) {
        :root {
          --base-size: 16px;
        }
        .hero h1 {
          font-size: 2.25rem;
        }
        .posts-grid {
          grid-template-columns: 1fr;
        }
        .post-header h1 {
          font-size: 1.75rem;
        }
        .content {
          font-size: 1.0625rem;
        }
        .nav-links a {
          font-size: 0.9375rem;
        }
      }
    </style>

    <!-- Favicon (browser tab icon) -->
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon" />

    <!-- PNG favicon alternatives (better for modern browsers) -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />

    <!-- Apple Touch Icon (when saved to iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icons/apple-touch-icon.png"
    />

    <!-- Android / PWA Icon -->
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#0a0a0b" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a href="index.html" class="logo" data-link aria-label="First Principles - Home">
          <span class="logo-icon" aria-hidden="true">◈</span>
          <span class="logo-text">First Principles</span>
        </a>
        <nav class="nav-links">
          <a href="https://github.com/TriBien" target="_blank" rel="noopener"
            >GitHub</a
          >
        </nav>
      </div>
    </header>

    <main id="main"></main>

    <footer class="footer">
      <div class="footer-bottom">
        <span>&copy; 2026 First Principles. All rights reserved.</span>
        <span>bienthanhtri@gmail.com</span>
      </div>
    </footer>

    <script src="posts.js"></script>
    <script>
      const POSTS = window.POSTS || [];
      const mainEl = document.getElementById("main");
      const categories = ["all", ...new Set(POSTS.map((p) => p.category))];

      const state = {
        category: "all",
        slug: null,
      };

      function getPostBySlug(slug) {
        return POSTS.find((p) => p.slug === slug);
      }

      function buildUrl(slug) {
        return slug ? `./?post=${slug}` : "index.html";
      }

      function parseUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get("post");
      }

      async function loadPost(slug) {
        const post = getPostBySlug(slug);
        if (!post) {
          mainEl.innerHTML = '<div class="empty-state">Post not found</div>';
          return;
        }

        try {
          const response = await fetch(post.url);
          const html = await response.text();
          mainEl.innerHTML = html;
          window.scrollTo(0, 0);
        } catch (err) {
          mainEl.innerHTML =
            '<div class="empty-state">Failed to load post</div>';
          console.error("Load post error:", err);
        }
      }

      function renderFilters() {
        const filtersEl =
          document.getElementById("filters") || document.createElement("div");
        filtersEl.className = "filters";
        filtersEl.id = "filters";
        filtersEl.innerHTML = categories
          .map(
            (c) =>
              `<button class="filter-btn ${c === state.category ? "active" : ""}" data-category="${c}" aria-pressed="${c === state.category}">${c === "all" ? "All" : c}</button>`,
          )
          .join("");
        return filtersEl;
      }

      function renderGrid() {
        const gridEl = document.createElement("div");
        gridEl.className = "posts-grid";
        gridEl.id = "grid";

        const filtered =
          state.category === "all"
            ? POSTS
            : POSTS.filter((p) => p.category === state.category);

        if (filtered.length === 0) {
          gridEl.innerHTML = '<div class="empty-state">No posts found</div>';
        } else {
          gridEl.innerHTML = filtered
            .map(
              (post) => `
          <button class="post-card" data-slug="${post.slug}">
            <span class="category">${post.category}</span>
            <h2>${post.title}</h2>
            <p class="excerpt">${post.excerpt || ""}</p>
            <div class="meta">${post.date}</div>
          </button>
        `,
            )
            .join("");
        }
        return gridEl;
      }

      function renderHome() {
        const hero = document.createElement("div");
        hero.className = "hero";
        hero.innerHTML = `
        <div class="hero-tag">◈ Must Understand Deeply</div>
        <h1>Question everything.<br><span class="highlight">Build from first principles.</span></h1>
        <p>Technical exploration through the lens of fundamentals — not trending, but true.</p>
      `;

        const sectionHeader = document.createElement("div");
        sectionHeader.className = "section-header";
        sectionHeader.innerHTML = "<h2>All Posts</h2>";

        mainEl.innerHTML = "";
        mainEl.appendChild(hero);
        mainEl.appendChild(sectionHeader);
        mainEl.appendChild(renderFilters());
        mainEl.appendChild(renderGrid());
      }

      function handleRouteChange() {
        const slug = parseUrl();
        state.slug = slug;

        console.log("slug: ", slug);
        if (slug) {
          loadPost(slug);
        } else {
          renderHome();
        }
      }

      document.addEventListener("click", (e) => {
        const logoLink = e.target.closest(".logo");
        if (logoLink) {
          e.preventDefault();
          history.pushState(null, "", buildUrl(null));
          state.category = "all";
          handleRouteChange();
          return;
        }

        const postCard = e.target.closest(".post-card");
        if (postCard) {
          e.preventDefault();
          const slug = postCard.dataset.slug;
          history.pushState(null, "", buildUrl(slug));
          state.slug = slug;
          loadPost(slug);
        }

        const filterBtn = e.target.closest(".filter-btn");
        if (filterBtn) {
          state.category = filterBtn.dataset.category;
          renderHome();
        }

        const backLink = e.target.closest(".back-link");
        if (backLink) {
          e.preventDefault();
          history.pushState(null, "", buildUrl(null));
          state.slug = null;
          renderHome();
        }
      });

      window.addEventListener("popstate", handleRouteChange);

      handleRouteChange();
    </script>
  </body>
</html>
